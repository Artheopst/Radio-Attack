# ============================================
# CONFIG WPA1-TKIP — hostapd_wpa1.conf
# VULNÉRABLE : handshake + dico / TKIP MIC exploit
# NOTE : masqué par iOS 14+ et Android 10+
#        (wpa=3 = mode mixte WPA1+WPA2 pour visibilité)
# ============================================
interface=wlan0
driver=nl80211
ssid=Lab-WPA1-Network
hw_mode=g
channel=6
auth_algs=1
wpa=3
wpa_key_mgmt=WPA-PSK
wpa_pairwise=TKIP
rsn_pairwise=CCMP
wpa_passphrase=password123
ieee80211w=0
