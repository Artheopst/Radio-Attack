# ============================================
# CONFIG WPA2-PSK sans PMF — hostapd_wpa2.conf
# VULNÉRABLE : deauth + handshake + crack dico
# ieee80211w=0 → trames management non protégées
# ============================================
interface=wlan0
driver=nl80211
ssid=Lab-WPA2-Network
hw_mode=g
channel=6
ieee80211n=1
auth_algs=1
wpa=2
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP
wpa_passphrase=password123
ieee80211w=0
