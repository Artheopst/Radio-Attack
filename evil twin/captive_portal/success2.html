<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>McDonald's - Connecté</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: #292929;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 40px 24px;
            max-width: 400px;
        }
        .check-circle {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(255, 199, 44, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .check-circle svg {
            width: 36px;
            height: 36px;
        }
        h1 {
            color: #ffffff;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        p {
            color: #a0a0a0;
            font-size: 14px;
            line-height: 1.6;
        }
        .spinner {
            margin-top: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .spinner .dot {
            width: 6px;
            height: 6px;
            background: #FFC72C;
            border-radius: 50%;
            animation: pulse 1.2s ease-in-out infinite;
        }
        .spinner .dot:nth-child(2) { animation-delay: 0.15s; }
        .spinner .dot:nth-child(3) { animation-delay: 0.3s; }
        @keyframes pulse {
            0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1.2); }
        }
        .spinner span {
            color: #777;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="check-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="#FFC72C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
        </div>
        <h1>Vous êtes connecté !</h1>
        <p>Profitez du Wi-Fi gratuit McDonald's.<br>Bonne navigation.</p>
        <div class="spinner">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <span>Redirection en cours…</span>
        </div>
    </div>
</body>
</html>
